; OH Tank Transmitter – ATmega328P + RFM95 LoRa + Float Switch
;
; Hardware: ATmega328P running at 8 MHz (3.3 V), RFM95 LoRa module via SPI,
;           one or two float switches on digital pins.
;
; This firmware reads the OH (overhead) tank float switch(es) and
; broadcasts a FloatPacket via LoRa every 5 seconds so the controller
; (controller_firmware) can update the OH tank state.

[env:upload_uart]
platform   = atmelavr
board      = ATmega328P
board_build.f_cpu = 8000000L
framework  = arduino
upload_protocol = urclock
board_upload.speed  = 57600
board_bootloader.speed = 57600
monitor_speed = 57600
lib_deps =
    sandeepmistry/LoRa@^0.8.0

[env:upload_serial]
platform   = atmelavr
board      = ATmega328P
board_build.f_cpu = 8000000L
framework  = arduino
upload_protocol = arduino
upload_speed = 57600
monitor_speed = 57600
lib_deps =
    sandeepmistry/LoRa@^0.8.0
