; Tank Monitor - Float Switch Edition
; Clean rewrite using float switches for both UG and OH tanks.
; OH tank float state is received via LoRa from a remote node.

[env:nebulas3]
platform = espressif32
board = nebulas3
board_build.psram_size = 0
framework = arduino
board_build.psram = disabled
board_build.partitions = partitions/ota_dual_app.csv
board_upload.speed = 115200
upload_speed = 115200
upload_protocol = espota
upload_port = tankmonitor.local
upload_flags =
    --auth=tank1234
    --timeout=120
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_resetmethod = ck
build_flags =
    -D SERIAL_RX_BUFFER_SIZE=256
    -D SERIAL_TX_BUFFER_SIZE=256
    -D CORE_DEBUG_LEVEL=4
lib_deps =
    jgromes/RadioLib@^6.6.0
    iakop/LiquidCrystal_I2C_ESP32@^1.1.6
    arduino-libraries/NTPClient@^3.2.1
    paulstoffregen/Time@^1.6.1
    bblanchon/ArduinoJson@^6.21.3
    adafruit/RTClib@^2.1.4
    knolleary/PubSubClient@^2.8

[env:nebulas3_serial]
platform = espressif32
board = nebulas3
board_build.psram_size = 0
framework = arduino
board_build.psram = disabled
board_build.partitions = partitions/ota_dual_app.csv
upload_protocol = esptool
upload_speed = 115200
upload_port = COM7
upload_resetmethod = hard_reset
monitor_speed = 115200
build_flags =
    -D SERIAL_RX_BUFFER_SIZE=256
    -D SERIAL_TX_BUFFER_SIZE=256
    -D CORE_DEBUG_LEVEL=4
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    jgromes/RadioLib@^6.6.0
    iakop/LiquidCrystal_I2C_ESP32@^1.1.6
    arduino-libraries/NTPClient@^3.2.1
    paulstoffregen/Time@^1.6.1
    bblanchon/ArduinoJson@^6.21.3
    adafruit/RTClib@^2.1.4
    knolleary/PubSubClient@^2.8
